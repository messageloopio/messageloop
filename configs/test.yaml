# E2E Test Configuration
# Copy this file to test.yaml and adjust values as needed

server:
  http:
    addr: "127.0.0.1:8080"
  grpc_admin:
    addr: "127.0.0.1:9091"
  heartbeat:
    idle_timeout: "300s"
  rpc_timeout: "30s"

transport:
  websocket:
    addr: ":9080"
    path: "/ws"
  grpc:
    addr: ":9090"

broker:
  type: redis
  redis:
    addr: "localhost:6379"
    password: "123456"

proxy: {}
