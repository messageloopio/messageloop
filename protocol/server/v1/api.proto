syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package messageloop.server.v1;

// buf:lint:ignore FILE_SAME_GO_PACKAGE
option go_package = "github.com/messageloopio/messageloop/genproto/server/v1;serverpb";

import "shared/v1/types.proto";
import "shared/v1/errors.proto";

service APIService {
  rpc Publish(PublishRequest) returns(PublishResponse);
  rpc Disconnect(DisconnectRequest) returns(DisconnectResponse);
  rpc Subscribe(SubscribeRequest) returns(SubscribeResponse);
  rpc Unsubscribe(UnsubscribeRequest) returns(UnsubscribeResponse);
  rpc Survey(SurveyRequest) returns(SurveyResponse);
}

// --- Publish ---

message Publication {
  message Options {
    bool add_history = 1;
  }
  message Destination {
    repeated string sessions = 1;
    repeated string channels = 2;
  }

  string id = 1;
  Destination destination = 2;
  Options options = 3;
  messageloop.shared.v1.Payload payload = 4;
  messageloop.shared.v1.Metadata metadata = 5;
}

message PublishRequest {
  string request_id = 1;
  repeated Publication publications = 2;
}

message PublishResponse {}

// --- Survey ---

message SurveyRequest {
  string request_id = 1;
  string channel = 2;
  messageloop.shared.v1.Payload payload = 3;
  messageloop.shared.v1.Metadata metadata = 4;
  int32 timeout_ms = 5;
}

message SurveyResponse {
  string request_id = 1;
  repeated SurveyResult results = 2;
}

message SurveyResult {
  string session_id = 1;
  messageloop.shared.v1.Payload payload = 2;
  messageloop.shared.v1.Metadata metadata = 3;
  messageloop.shared.v1.Error error = 4;
}

// --- Disconnect ---

message DisconnectRequest {
  repeated string sessions = 1;
  uint32 code = 2;
  string reason = 3;
}

message DisconnectResponse {
  map<string, bool> results = 1;
}

// --- Subscribe/Unsubscribe ---

message SubscribeRequest {
  string session_id = 1;
  repeated string channels = 2;
}

message SubscribeResponse {
  map<string, bool> results = 1;
}

message UnsubscribeRequest {
  string session_id = 1;
  repeated string channels = 2;
}

message UnsubscribeResponse {
  map<string, bool> results = 1;
}
