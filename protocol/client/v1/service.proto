syntax = "proto3";

package messageloop.client.v1;

option go_package = "github.com/messageloopio/messageloop/genproto/client/v1;clientpb";

import "shared/v1/types.proto";
import "shared/v1/errors.proto";

service MessageLoopService {
  // 核心双向数据流
  // buf:lint:ignore RPC_REQUEST_STANDARD_NAME
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  rpc MessageLoop(stream InboundMessage) returns (stream OutboundMessage);
}

// 客户端 -> 服务端
message InboundMessage {
  string id = 1;
  uint64 time = 2;
  oneof envelope {
    Connect connect = 3;
    Subscribe subscribe = 4;
    Unsubscribe unsubscribe = 5;
    Publish publish = 6;
    RpcRequest rpc_request = 7 [json_name = "rpc_request"];
    SubRefresh sub_refresh = 8 [json_name = "sub_refresh"];
    SurveyRequest survey_request = 9 [json_name = "survey_request"];
    SurveyReply survey_reply = 10 [json_name = "survey_reply"];
    Ping ping = 11;
  }
}

// 服务端 -> 客户端
message OutboundMessage {
  string id = 1;
  uint64 time = 2;
  oneof envelope {
    messageloop.shared.v1.Error error = 3;
    Connected connected = 4;
    SubscribeAck subscribe_ack = 5 [json_name = "subscribe_ack"];
    UnsubscribeAck unsubscribe_ack = 6 [json_name = "unsubscribe_ack"];
    PublishAck publish_ack = 7 [json_name = "publish_ack"];
    Publication publication = 8;
    RpcReply rpc_reply = 9 [json_name = "rpc_reply"];
    SubRefreshAck sub_refresh_ack = 10 [json_name = "sub_refresh_ack"];
    SurveyRequest survey_request = 11 [json_name = "survey_request"];
    SurveyReply survey_reply = 12 [json_name = "survey_reply"];
    Pong pong = 13;
  }
}

// --- 消息类型定义 ---

message Connect {
  string client_id = 1 [json_name = "client_id"];
  string client_type = 2 [json_name = "client_type"];
  string token = 3;
  string version = 4;
  repeated Subscription subscriptions = 5;
}

message Connected {
  string session_id = 1 [json_name = "session_id"];
  repeated Subscription subscriptions = 2;
  repeated Publication publications = 3;
}

message Subscription {
  string channel = 1;
  bool ephemeral = 2;
  string token = 3;
}

message Subscribe {
  repeated Subscription subscriptions = 1;
}

message SubscribeAck {
  repeated Subscription subscriptions = 1;
}

message Unsubscribe {
  repeated Subscription subscriptions = 1;
}

message UnsubscribeAck {
  repeated Subscription subscriptions = 1;
}

// --- 发布相关 ---

message Publish {
  string channel = 1;
  messageloop.shared.v1.Payload payload = 2;
  messageloop.shared.v1.Metadata metadata = 3;
  string token = 4;
}

message PublishAck {
  string id = 1;      // 消息 ID，便于追踪
  uint64 offset = 2;  // 流位置
}

message Message {
  string id = 1;
  string channel = 2;
  uint64 offset = 3;
  messageloop.shared.v1.Payload payload = 4;
  messageloop.shared.v1.Metadata metadata = 5;
}

message Publication {
  repeated Message messages = 1;
}

// --- RPC 相关 ---

message RpcRequest {
  string channel = 1;
  string method = 2;
  messageloop.shared.v1.Payload payload = 3;
  messageloop.shared.v1.Metadata metadata = 4;
}

message RpcReply {
  string request_id = 1 [json_name = "request_id"];
  messageloop.shared.v1.Payload payload = 2;
  messageloop.shared.v1.Metadata metadata = 3;
  messageloop.shared.v1.Error error = 4;
}

// --- Survey 相关 ---

message SubRefresh {
  repeated string channels = 1;
}

message SubRefreshAck {}

message SurveyRequest {
  string request_id = 1 [json_name = "request_id"];
  messageloop.shared.v1.Payload payload = 2;
  messageloop.shared.v1.Metadata metadata = 3;
}

message SurveyReply {
  string request_id = 1 [json_name = "request_id"];
  messageloop.shared.v1.Payload payload = 2;
  messageloop.shared.v1.Metadata metadata = 3;
  messageloop.shared.v1.Error error = 4;
}

// --- 心跳 ---

message Ping {}

message Pong {}
