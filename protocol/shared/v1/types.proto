syntax = "proto3";

package messageloop.shared.v1;

option go_package = "github.com/messageloopio/messageloop/shared/genproto/shared/v1;sharedpb";

import "google/protobuf/struct.proto";

// 统一的数据载荷类型
message Payload {
  string content_type = 1;              // 数据内容类型 (e.g., "application/json", "text/plain", "application/octet-stream")
  oneof data {
    google.protobuf.Struct json = 2;    // JSON 对象，编码时可读
    bytes binary = 3;                   // 二进制数据
    string text = 4;                    // 文本数据
  }
}

// 统一的元数据类型
message Metadata {
  map<string, string> entries = 1;
}
