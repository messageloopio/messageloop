server:
  http:
    addr: ":8080"
  heartbeat:
    idle_timeout: "300s"
  rpc_timeout: "30s"  # Default RPC request timeout

transport:
  websocket:
    addr: ":9080"
    path: "/ws"
    check_origin: true  # Set to true for development to allow cross-origin requests
  grpc:
    addr: ":9090"

broker:
  type: redis
  redis:
    addr: 127.0.0.1:6379
    password: ""
    db: 10

cluster:
  enabled: false       # Set to true to enable the Redis-backed distributed control plane.
  node_id: node-a      # Must be unique per logical node in the cluster.
  backend: redis       # Current distributed control-plane backend.

proxy:
  - name: example
    endpoint: 127.0.0.1:9091
    timeout: 30s
    grpc:
      insecure: true
    routes:
      - channel: "*"
        method: "*"